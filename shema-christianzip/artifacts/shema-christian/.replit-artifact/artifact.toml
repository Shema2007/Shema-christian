kind = "web"
previewPath = "/"
title = "Shema Christian"
version = "1.0.0"
id = "artifacts/shema-christian"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20225

[services.development]
run = "pnpm --filter @workspace/shema-christian run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/shema-christian", "run", "build" ]
publicDir = "artifacts/shema-christian/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20225"
BASE_PATH = "/"
